<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #eee;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff8855;
        }

        #score-board {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #ffcc00;
        }

        canvas {
            border: 3px solid #00ff88;
            border-radius: 5px;
            box-shadow: 0 0 20px #00ff8833;
            background: #0f0f23;
        }

        #controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #ff4444;
            text-align: center;
        }

        #game-over h2 {
            color: #ff4444;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        #game-over p {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        #restart-btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        /* Mobile controls */
        #mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }

        .d-pad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }

        .d-pad button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: #2a2a4e;
            color: #00ff88;
            border: 2px solid #00ff88;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .d-pad button:active {
            background: #00ff88;
            color: #1a1a2e;
        }

        .d-pad .up { grid-area: up; }
        .d-pad .down { grid-area: down; }
        .d-pad .left { grid-area: left; }
        .d-pad .right { grid-area: right; }

        @media (max-width: 600px) {
            #mobile-controls { display: block; }
            canvas { max-width: 90vw; max-height: 50vh; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <div id="score-board">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="controls">
        Arrow Keys or WASD to move | Space to pause | Enter to restart
    </div>
    <div id="mobile-controls">
        <div class="d-pad">
            <button class="up" ontouchstart="setDir(0,-1)">▲</button>
            <button class="left" ontouchstart="setDir(-1,0)">◀</button>
            <button class="right" ontouchstart="setDir(1,0)">▶</button>
            <button class="down" ontouchstart="setDir(0,1)">▼</button>
        </div>
    </div>

    <div id="game-over">
        <h2>GAME OVER</h2>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="resetGame()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const GRID = 20;
        const CELLS = canvas.width / GRID;

        let snake, food, dir, nextDir, score, best, gameLoop, speed, paused, gameOver;

        best = parseInt(localStorage.getItem('snakeBest') || '0');
        document.getElementById('best').textContent = best;

        function init() {
            snake = [{x: 10, y: 10}];
            dir = {x: 1, y: 0};
            nextDir = {x: 1, y: 0};
            score = 0;
            speed = 180;
            paused = false;
            gameOver = false;
            document.getElementById('score').textContent = score;
            document.getElementById('game-over').style.display = 'none';
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * CELLS),
                    y: Math.floor(Math.random() * CELLS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function draw() {
            // Background
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines (subtle)
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < CELLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID, 0);
                ctx.lineTo(i * GRID, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID);
                ctx.lineTo(canvas.width, i * GRID);
                ctx.stroke();
            }

            // Snake
            snake.forEach((seg, i) => {
                const intensity = 1 - (i / snake.length) * 0.6;
                ctx.fillStyle = `rgba(0, 255, 136, ${intensity})`;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = i === 0 ? 10 : 3;
                ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
                ctx.shadowBlur = 0;
            });

            // Food
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Pause overlay
            if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffcc00';
                ctx.font = '30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
            }
        }

        function update() {
            if (paused || gameOver) return;

            dir = nextDir;
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

            // Wall collision
            if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    document.getElementById('best').textContent = best;
                    localStorage.setItem('snakeBest', best);
                }
                spawnFood();
                // Speed up slightly
                if (speed > 80) speed -= 2;
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function resetGame() {
            init();
            draw();
            clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }

        function setDir(x, y) {
            // Prevent reversing
            if (x === -dir.x && y === -dir.y) return;
            nextDir = {x, y};
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault(); setDir(0, -1); break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault(); setDir(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault(); setDir(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault(); setDir(1, 0); break;
                case ' ':
                    e.preventDefault();
                    if (!gameOver) paused = !paused;
                    if (paused) draw();
                    break;
                case 'Enter':
                    e.preventDefault();
                    resetGame();
                    break;
            }
        });

        // Touch swipe support
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        });

        // Start
        init();
        draw();
        gameLoop = setInterval(update, speed);
    </script>
</body>
</html>
